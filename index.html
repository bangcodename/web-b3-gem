<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Fotografi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; }
        header { background-color: #222; color: #fff; padding: 4rem 2rem; text-align: center; }
        header h1 { margin: 0; font-size: 2.5rem; }
        header p { margin-top: 1rem; font-size: 1.2rem; color: #ccc; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .gallery-item { overflow: hidden; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; aspect-ratio: 1 / 1; }
        footer { text-align: center; padding: 2rem; background-color: #222; color: #fff; margin-top: 2rem; }
    </style>
</head>
<body>
    <header>
        <h1>Galeri Fotografi</h1>
        <p>Menangkap setiap momen dan cerita melalui lensa.</p>
    </header>

    <main class="container">
        <div class="gallery">
            <div class="gallery-item"><img src="https://picsum.photos/id/1015/400/400" alt="Foto 1"></div>
            <div class="gallery-item"><img src="https://picsum.photos/id/1016/400/400" alt="Foto 2"></div>
            <div class="gallery-item"><img src="https://picsum.photos/id/1018/400/400" alt="Foto 3"></div>
            <div class="gallery-item"><img src="https://picsum.photos/id/1019/400/400" alt="Foto 4"></div>
            <div class="gallery-item"><img src="https://picsum.photos/id/1020/400/400" alt="Foto 5"></div>
            <div class="gallery-item"><img src="https://picsum.photos/id/1021/400/400" alt="Foto 6"></div>
            <div class="gallery-item"><img src="https://picsum.photos/id/1022/400/400" alt="Foto 7"></div>
            <div class="gallery-item"><img src="https://picsum.photos/id/1023/400/400" alt="Foto 8"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2023 Galeri Fotografi. Hak Cipta Dilindungi.</p>
    </footer>
</body>
</html>
